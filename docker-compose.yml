services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: mcp_watch
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: mcp_schema_watch
    ports:
      - "5433:5432"
    volumes:
      - mcp_schema_watch_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mcp_watch"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mcp_schema_watch_pgdata:
